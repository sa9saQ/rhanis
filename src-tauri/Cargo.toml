[package]
name = "koe"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "koe_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Secret store (BYOK). The stronghold *plugin* is NOT registered; we use the
# `Stronghold` wrapper type directly from Rust so the WebView gets no JS surface.
tauri-plugin-stronghold = "2"
iota_stronghold = "2"
zeroize = "1"
getrandom = "0.2"

# OS keychain for the 32-byte Stronghold snapshot key. Platform-split so the
# crate compiles both on the Windows target and in the WSL/Linux dev box used
# for `cargo test` (pure-Rust secret-service backend, no system libs needed).
[target.'cfg(windows)'.dependencies]
keyring = { version = "3", features = ["windows-native"] }

[target.'cfg(not(windows))'.dependencies]
keyring = { version = "3", features = ["sync-secret-service", "crypto-rust"] }

[dev-dependencies]
tempfile = "3"

