<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhanis — トーン3 先進的・テック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14181b; --surface:#1b2125; --surface-2:#222a2f; --elev:#232c31;
    --ink:#e9e7e1; --ink-2:#c2c8c6; --muted:#7e8a89; --line:#2b3438;
    --accent:#3ec8b4; --accent-2:#e0a64b; --accent-soft:rgba(62,200,180,.12); --accent-ink:#7fe6d6;
    --danger:#e06155;
    --font-jp:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;
    --font-en:'Space Grotesk',var(--font-jp);
    --mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
    --ease-spring:cubic-bezier(.2,.8,.2,1);
    --ease-decel:cubic-bezier(0,0,.2,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-jp);
    -webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;
    background-image:radial-gradient(120% 80% at 80% -10%,rgba(62,200,180,.08),transparent 60%)}
  .app{display:grid;grid-template-columns:266px 1fr;height:100vh}

  .sidebar{background:var(--surface);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:18px 14px}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 20px}
  .brand .mark{width:23px;height:23px}
  .brand .name{font-family:var(--font-en);font-weight:700;font-size:18px;letter-spacing:.5px}
  .new-chat{display:flex;align-items:center;gap:8px;width:100%;
    background:var(--accent);color:#0c1416;border:none;border-radius:10px;
    padding:11px 14px;font-family:var(--font-jp);font-weight:700;font-size:14px;cursor:pointer;
    box-shadow:0 0 0 1px rgba(62,200,180,.3),0 8px 20px -12px rgba(62,200,180,.7);
    transition:transform .15s var(--ease-spring),filter .15s}
  .new-chat:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .nav{margin-top:14px;display:flex;flex-direction:column;gap:2px}
  .nav-item{display:flex;align-items:center;gap:10px;border:none;background:none;
    color:var(--ink-2);font-family:var(--font-jp);font-size:13.5px;text-align:left;
    padding:9px 11px;border-radius:8px;cursor:pointer;transition:background .13s,color .13s}
  .nav-item:hover{background:var(--surface-2);color:var(--accent-ink)}
  .nav-item .ic{width:18px;text-align:center;font-size:14px;opacity:.85}
  .sec{font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;color:var(--muted);
    font-weight:500;padding:16px 12px 6px;text-transform:uppercase}
  .proj .dot{width:7px;height:7px;border-radius:2px}
  .proj .nav-item:nth-child(1) .dot{background:var(--accent)}
  .proj .nav-item:nth-child(2) .dot{background:var(--accent-2)}
  .proj .nav-item:nth-child(3) .dot{background:#6aa0e0}
  .spacer{flex:1}
  .balance{background:var(--accent-soft);border:1px solid rgba(62,200,180,.25);
    border-radius:12px;padding:11px 13px;margin-bottom:8px}
  .balance .row{display:flex;align-items:baseline;justify-content:space-between}
  .balance .amt{font-family:var(--font-en);font-weight:700;font-size:16px;color:var(--accent-ink)}
  .balance .time{font-family:var(--mono);font-size:11px;color:var(--accent-ink);opacity:.75}
  .balance .bar{height:5px;border-radius:99px;background:rgba(62,200,180,.18);margin-top:8px;overflow:hidden}
  .balance .bar i{display:block;height:100%;width:42%;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:99px;
    box-shadow:0 0 8px rgba(62,200,180,.6)}
  .foot-set{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13px;
    padding:9px 11px;border-radius:8px;cursor:pointer;border:none;background:none;font-family:var(--font-jp)}
  .foot-set:hover{background:var(--surface-2)}

  .main{display:flex;flex-direction:column;padding:30px 42px 22px;overflow:hidden}
  .greeting{font-family:var(--font-en);font-weight:600;font-size:26px;letter-spacing:.3px;margin-bottom:4px}
  .greeting .jp{font-family:var(--font-jp)}
  .sub{color:var(--muted);font-size:13.5px;margin-bottom:26px}
  .conversation{display:flex;flex-direction:column;gap:12px;max-width:680px}
  .msg{max-width:78%;padding:12px 17px;font-size:14.5px;line-height:1.6;border-radius:14px}
  .msg.user{align-self:flex-end;background:var(--accent);color:#0c1416;font-weight:500;
    border-bottom-right-radius:5px}
  .msg.assistant{align-self:flex-start;background:var(--elev);border:1px solid var(--line);
    color:var(--ink-2);border-bottom-left-radius:5px;display:flex;align-items:center;gap:9px}
  .typing{display:inline-flex;gap:3px}
  .typing i{width:5px;height:5px;border-radius:99px;background:var(--accent);
    box-shadow:0 0 6px var(--accent);animation:blink 1.1s var(--ease-decel) infinite}
  .typing i:nth-child(2){animation-delay:.17s}.typing i:nth-child(3){animation-delay:.34s}
  @keyframes blink{0%,60%,100%{opacity:.2}30%{opacity:1}}

  .activity{margin-top:30px;max-width:680px;background:linear-gradient(180deg,var(--elev),var(--surface));
    border:1px solid var(--line);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;
    box-shadow:0 0 0 1px rgba(62,200,180,.06),0 20px 40px -28px rgba(0,0,0,.8)}
  .activity::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;
    background:linear-gradient(180deg,var(--accent),transparent);box-shadow:0 0 12px var(--accent)}
  .activity-head{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;
    letter-spacing:1.5px;color:var(--accent-ink);margin-bottom:15px;text-transform:uppercase}
  .activity-head .label-jp{font-family:var(--font-jp);letter-spacing:0;font-weight:700;font-size:12.5px}
  .activity-head .pulse{width:8px;height:8px;border-radius:99px;background:var(--accent);
    box-shadow:0 0 8px var(--accent);animation:ring 1.8s var(--ease-decel) infinite}
  @keyframes ring{0%{box-shadow:0 0 8px var(--accent),0 0 0 0 rgba(62,200,180,.5)}70%{box-shadow:0 0 8px var(--accent),0 0 0 8px rgba(62,200,180,0)}100%{box-shadow:0 0 8px var(--accent),0 0 0 0 rgba(62,200,180,0)}}
  .a-row{display:flex;align-items:flex-start;gap:11px;padding:7px 0;font-size:14px;line-height:1.5}
  .a-row .gl{width:20px;flex:none;text-align:center;font-size:15px}
  .a-row.think{color:var(--ink)}
  .a-row.tool .tn{font-family:var(--mono);font-size:13px;color:var(--accent-ink);
    background:var(--accent-soft);padding:1px 8px;border-radius:5px;border:1px solid rgba(62,200,180,.2)}
  .a-row.tool .q{color:var(--muted);font-family:var(--mono);font-size:12.5px}
  .a-row.tool .ok{margin-left:auto;color:var(--accent);font-weight:700}
  .a-row.src{color:var(--muted);font-size:13px}
  .a-row.src a{color:var(--accent-ink);text-decoration:none;font-family:var(--mono);font-size:12.5px}

  .voicebar{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:12px;padding-top:18px}
  .orb{width:66px;height:66px;border-radius:999px;position:relative;
    background:radial-gradient(circle at 38% 32%,#5fe6d2 0%,var(--accent) 50%,#1c8576 100%);
    box-shadow:0 0 28px -2px rgba(62,200,180,.55),inset 0 0 12px rgba(255,255,255,.2);
    animation:breathe 3.4s var(--ease-decel) infinite}
  .orb::after,.orb::before{content:"";position:absolute;border-radius:999px;border:1.5px solid var(--accent)}
  .orb::after{inset:-8px;opacity:.4;animation:halo 3.4s var(--ease-decel) infinite}
  .orb::before{inset:-16px;opacity:.18;animation:halo 3.4s var(--ease-decel) .4s infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes halo{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.18);opacity:.05}}
  .voice-label{font-size:13px;color:var(--muted);font-family:var(--mono);letter-spacing:.3px}
  .voice-label b{color:var(--accent-ink);font-weight:500}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 24 24" fill="none"><path d="M12 3c3.4 4 6 7.2 6 10.4A6 6 0 0 1 6 13.4C6 10.2 8.6 7 12 3Z" fill="#3ec8b4"/><path d="M9.6 13.6a2.6 2.6 0 0 0 2.4 2.4" stroke="#0c1416" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="name">Rhanis</span>
    </div>
    <button class="new-chat"><span>＋</span> 新しい会話</button>
    <div class="nav">
      <button class="nav-item"><span class="ic">🔍</span> 検索</button>
    </div>
    <div class="sec">Projects</div>
    <div class="nav proj">
      <button class="nav-item"><span class="dot"></span> 旅行計画</button>
      <button class="nav-item"><span class="dot"></span> 毎朝ニュース</button>
      <button class="nav-item"><span class="dot"></span> 確定申告</button>
    </div>
    <div class="sec">Capabilities</div>
    <div class="nav">
      <button class="nav-item"><span class="ic">⚡</span> オートメーション</button>
      <button class="nav-item"><span class="ic">🧩</span> 手足tool</button>
      <button class="nav-item"><span class="ic">📋</span> タスクボード</button>
    </div>
    <div class="spacer"></div>
    <button class="foot-set"><span>⚙</span> 設定</button>
  </aside>

  <main class="main">
    <div class="greeting"><span class="jp">今日は何をしましょう？</span></div>
    <div class="sub">声で話しかけても、入力してもOKです。</div>

    <div class="conversation">
      <div class="msg user">新幹線の時刻、調べて</div>
      <div class="msg assistant">調べています <span class="typing"><i></i><i></i><i></i></span></div>
    </div>

    <div class="activity">
      <div class="activity-head"><span class="pulse"></span> <span class="label-jp">今していること</span></div>
      <div class="a-row think"><span class="gl">💭</span><span>東京→新大阪の新幹線の時刻を確認しています</span></div>
      <div class="a-row tool"><span class="gl">🔧</span><span class="tn">web.search</span><span class="q">"東京 新大阪 新幹線 時刻"</span><span class="ok">✓</span></div>
      <div class="a-row src"><span class="gl">📎</span><a href="#">jr-central.co.jp</a></div>
    </div>

    <div class="voicebar">
      <div class="orb" aria-label="聞いています"></div>
      <div class="voice-label"><b>聞いています</b> — 話しかけてください</div>
    </div>
  </main>
</div>
</body>
</html>
